<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine 猜拳辨識</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 TensorFlow.js 與 Teachable Machine Image 庫 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10">

    <h1 class="text-3xl font-bold text-gray-800 mb-6">Teachable Machine 版本</h1>

    <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-md text-center">
        <button type="button" onclick="init()" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold mb-4 hover:bg-blue-700">
            啟動相機與載入模型
        </button>

        <div id="webcam-container" class="flex justify-center mb-4 overflow-hidden rounded-lg bg-black aspect-video"></div>
        <div id="label-container" class="text-xl font-bold text-gray-700 flex flex-col gap-2"></div>
    </div>

    <script type="text/javascript">
        // 注意：請確保網址結尾有斜線 /
        const URL = "https://teachablemachine.withgoogle.com/models/jlbYYHHZ9/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            try {
                // 檢查網址合法性
                if (!URL || URL.includes("YOUR_MODEL_ID")) {
                    alert("請在程式碼中填入正確的模型 URL");
                    return;
                }

                // 修正網址拼接，確保載入正確
                const baseUrl = URL.endsWith('/') ? URL : URL + '/';
                const modelURL = baseUrl + "model.json";
                const metadataURL = baseUrl + "metadata.json";

                document.getElementById('label-container').innerHTML = "正在下載模型... (請稍候)";
                
                // 載入模型
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // 設定相機
                const flip = true; 
                webcam = new tmImage.Webcam(300, 300, flip); 
                
                // 嘗試啟動相機
                await webcam.setup({ facingMode: "user" }); 
                await webcam.play();
                window.requestAnimationFrame(loop);

                // 更新介面
                document.getElementById("webcam-container").innerHTML = "";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) {
                    labelContainer.appendChild(document.createElement("div"));
                }
            } catch (error) {
                console.error("Initialization Error:", error);
                // 顯示更具體的錯誤原因
                let errorMsg = error.message || "未知錯誤 (可能是網路中斷或相機被佔用)";
                alert("發生錯誤！\n1. 請確認 GitHub Pages 是否已開啟 HTTPS。\n2. 請確認是否允許了相機權限。\n3. 檢查模型網址是否為有效連結。\n\n詳細錯誤: " + errorMsg);
                document.getElementById('label-container').innerHTML = "載入失敗：" + errorMsg;
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            if (!model || !webcam) return;
            const prediction = await model.predict(webcam.canvas);
            
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction =
                    prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(1) + "%";
                labelContainer.childNodes[i].innerHTML = classPrediction;
                
                if(prediction[i].probability > 0.8) {
                    labelContainer.childNodes[i].className = "text-blue-600 font-extrabold scale-110 transition-transform";
                } else {
                    labelContainer.childNodes[i].className = "text-gray-500 font-normal scale-100";
                }
            }
        }
    </script>
</body>
</html>
