<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可愛數學打地鼠 - 加法大挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body {
            font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
            background: #ecfdf5;
            overflow: hidden;
            touch-action: manipulation;
        }

        .mole-hole {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            background: #78350f;
            border-radius: 50% 50% 30% 30%;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
            border-bottom: 8px solid #451a03;
        }

        .mole-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 100%;
            overflow: hidden;
            border-radius: 50% 50% 0 0;
        }

        .mole {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 90%;
            transition: bottom 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .mole.up {
            bottom: 5%;
        }

        /* 可愛地鼠視覺 */
        .mole-body {
            width: 80%;
            height: 80%;
            background: #b45309;
            border-radius: 50% 50% 20% 20%;
            position: relative;
            border: 3px solid #78350f;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 答對的地鼠變顏色 */
        .mole.correct .mole-body { background: #10b981; border-color: #065f46; }
        .mole.wrong .mole-body { background: #ef4444; border-color: #991b1b; }

        .mole-face {
            position: absolute;
            top: 20%;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .eye { width: 8px; height: 8px; background: #000; border-radius: 50%; }
        .nose { width: 12px; height: 8px; background: #f87171; border-radius: 40%; margin-top: 5px; }

        .answer-text {
            color: white;
            font-size: 1.8rem;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: explode 0.6s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- 頂部資訊欄 -->
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-6 mb-4 text-center border-4 border-amber-200 z-10">
        <h1 class="text-3xl font-bold text-amber-600 mb-2 flex items-center justify-center gap-2">
            🐹 數學大挑戰
        </h1>
        <div class="flex justify-between items-center mb-4 text-xl">
            <div class="bg-yellow-100 px-4 py-1 rounded-full text-yellow-700 font-bold border-2 border-yellow-200">得分: <span id="score">0</span></div>
            <div class="bg-blue-100 px-4 py-1 rounded-full text-blue-700 font-bold border-2 border-blue-200">時間: <span id="timer">30</span>s</div>
        </div>
        
        <!-- 題目區 -->
        <div id="question-box" class="bg-amber-500 text-white py-4 rounded-2xl shadow-lg border-b-4 border-amber-700 mb-2">
            <p class="text-sm font-medium opacity-90">算算看，答案在哪裡？</p>
            <p id="question" class="text-5xl font-black tracking-widest">?</p>
        </div>
    </div>

    <!-- 遊戲網格 -->
    <div id="game-grid" class="grid grid-cols-3 gap-4 max-w-md w-full px-2">
        <!-- 9個地鼠洞 -->
        <div class="mole-hole"><div class="mole-container"><div class="mole" data-index="0"><div class="mole-body"><div class="mole-face"><div class="eye"></div><div class="eye"></div></div><div class="nose"></div><span class="answer-text"></span></div></div></div></div>
        <div class="mole-hole"><div class="mole-container"><div class="mole" data-index="1"><div class="mole-body"><div class="mole-face"><div class="eye"></div><div class="eye"></div></div><div class="nose"></div><span class="answer-text"></span></div></div></div></div>
        <div class="mole-hole"><div class="mole-container"><div class="mole" data-index="2"><div class="mole-body"><div class="mole-face"><div class="eye"></div><div class="eye"></div></div><div class="nose"></div><span class="answer-text"></span></div></div></div></div>
        <div class="mole-hole"><div class="mole-container"><div class="mole" data-index="3"><div class="mole-body"><div class="mole-face"><div class="eye"></div><div class="eye"></div></div><div class="nose"></div><span class="answer-text"></span></div></div></div></div>
        <div class="mole-hole"><div class="mole-container"><div class="mole" data-index="4"><div class="mole-body"><div class="mole-face"><div class="eye"></div><div class="eye"></div></div><div class="nose"></div><span class="answer-text"></span></div></div></div></div>
        <div class="mole-hole"><div class="mole-container"><div class="mole" data-index="5"><div class="mole-body"><div class="mole-face"><div class="eye"></div><div class="eye"></div></div><div class="nose"></div><span class="answer-text"></span></div></div></div></div>
        <div class="mole-hole"><div class="mole-container"><div class="mole" data-index="6"><div class="mole-body"><div class="mole-face"><div class="eye"></div><div class="eye"></div></div><div class="nose"></div><span class="answer-text"></span></div></div></div></div>
        <div class="mole-hole"><div class="mole-container"><div class="mole" data-index="7"><div class="mole-body"><div class="mole-face"><div class="eye"></div><div class="eye"></div></div><div class="nose"></div><span class="answer-text"></span></div></div></div></div>
        <div class="mole-hole"><div class="mole-container"><div class="mole" data-index="8"><div class="mole-body"><div class="mole-face"><div class="eye"></div><div class="eye"></div></div><div class="nose"></div><span class="answer-text"></span></div></div></div></div>
    </div>

    <!-- 遊戲說明與開始畫面 -->
    <div id="overlay" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-3xl p-8 text-center max-w-sm w-full border-8 border-amber-400">
            <h2 id="overlay-title" class="text-4xl font-bold text-amber-600 mb-4 floating">哈囉！小小數學家</h2>
            
            <div id="instructions" class="text-left space-y-4 mb-8 text-gray-700">
                <div class="flex items-start gap-3">
                    <span class="bg-amber-100 p-2 rounded-lg text-xl">📝</span>
                    <p><span class="font-bold text-amber-600">數學題目：</span>畫面上方會出現一個 1 到 10 的加法題目。</p>
                </div>
                <div class="flex items-start gap-3">
                    <span class="bg-green-100 p-2 rounded-lg text-xl">🔨</span>
                    <p><span class="font-bold text-green-600">打地鼠機制：</span>地鼠會帶著數字鑽出來。打中<span class="text-green-600 font-bold">正確答案</span>得10分，打錯會扣5分喔！</p>
                </div>
                <div class="flex items-start gap-3">
                    <span class="bg-blue-100 p-2 rounded-lg text-xl">🎵</span>
                    <p>遊戲過程中有輕快的音樂陪你練習！</p>
                </div>
            </div>

            <button id="start-btn" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 px-10 rounded-full text-2xl transition transform active:scale-95 shadow-xl w-full border-b-4 border-amber-800">
                準備好，開始！
            </button>
        </div>
    </div>

    <script>
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const questionEl = document.getElementById('question');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const moles = document.querySelectorAll('.mole');

        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let currentAnswer = 0;
        let timerId;
        let moleTimeoutIds = [];
        
        // 音效系統
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playTone(freq, duration, type = 'sine', volume = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // 背景音樂循環
        let musicInterval;
        function startBGM() {
            const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
            let i = 0;
            musicInterval = setInterval(() => {
                if (!gameActive) return;
                playTone(notes[i % notes.length], 0.5, 'triangle', 0.05);
                i++;
            }, 500);
        }

        function generateQuestion() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            currentAnswer = num1 + num2;
            questionEl.innerText = `${num1} + ${num2}`;
        }

        function getWrongAnswer() {
            let wrong;
            do {
                wrong = Math.floor(Math.random() * 20) + 1;
            } while (wrong === currentAnswer);
            return wrong;
        }

        function popUp() {
            if (!gameActive) return;

            const idx = Math.floor(Math.random() * moles.length);
            const mole = moles[idx];
            
            if (mole.classList.contains('up')) {
                setTimeout(popUp, 100);
                return;
            }

            const isCorrect = Math.random() > 0.6;
            const val = isCorrect ? currentAnswer : getWrongAnswer();
            
            const textSpan = mole.querySelector('.answer-text');
            textSpan.innerText = val;
            mole.dataset.value = val;
            mole.classList.remove('hit', 'correct', 'wrong');
            mole.classList.add('up');

            const timeout = setTimeout(() => {
                mole.classList.remove('up');
                if (gameActive) popUp();
            }, Math.random() * 800 + 1200);

            moleTimeoutIds[idx] = timeout;
        }

        function whack(e) {
            if (!gameActive) return;
            const mole = e.currentTarget;
            if (!mole.classList.contains('up') || mole.classList.contains('hit')) return;

            const clickedVal = parseInt(mole.dataset.value);
            mole.classList.add('hit');

            if (clickedVal === currentAnswer) {
                score += 10;
                mole.classList.add('correct');
                playTone(880, 0.2, 'square', 0.1); // 高音 答對
                createParticles(e.pageX || e.touches[0].pageX, e.pageY || e.touches[0].pageY, '#10b981');
                generateQuestion();
            } else {
                score = Math.max(0, score - 5);
                mole.classList.add('wrong');
                playTone(220, 0.3, 'sawtooth', 0.1); // 低音 答錯
                createParticles(e.pageX || e.touches[0].pageX, e.pageY || e.touches[0].pageY, '#ef4444');
            }

            scoreEl.innerText = score;
            setTimeout(() => mole.classList.remove('up'), 300);
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.width = '12px';
                p.style.height = '12px';
                p.style.backgroundColor = color;
                p.style.borderRadius = '3px';
                p.style.setProperty('--tx', (Math.random() - 0.5) * 150 + 'px');
                p.style.setProperty('--ty', (Math.random() - 0.5) * 150 + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        function startGame() {
            initAudio();
            score = 0;
            timeLeft = 30;
            gameActive = true;
            scoreEl.innerText = score;
            timerEl.innerText = timeLeft;
            overlay.classList.add('hidden');
            
            generateQuestion();
            startBGM();
            
            timerId = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);

            popUp();
            setTimeout(popUp, 600);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerId);
            clearInterval(musicInterval);
            moleTimeoutIds.forEach(clearTimeout);
            moles.forEach(m => m.classList.remove('up'));

            document.getElementById('overlay-title').innerText = "挑戰結束！";
            document.getElementById('instructions').innerHTML = `
                <div class="text-center py-4">
                    <p class="text-2xl font-bold text-gray-800">你的分數是：<span class="text-amber-600 text-4xl">${score}</span> 分</p>
                    <p class="text-gray-500 mt-2">打地鼠讓數學變簡單了對吧？</p>
                </div>
            `;
            startBtn.innerText = "再玩一次";
            overlay.classList.remove('hidden');
        }

        startBtn.addEventListener('click', startGame);
        moles.forEach(mole => {
            mole.addEventListener('mousedown', whack);
            mole.addEventListener('touchstart', (e) => {
                e.preventDefault();
                whack(e);
            });
        });

        window.onload = () => {
            generateQuestion();
        };
    </script>
</body>
</html>
