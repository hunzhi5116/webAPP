<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人音樂盒 (資料夾載入版)</title>
    
    <!-- PWA 與圖示設定 -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3844/3844720.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3844/3844720.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="私人音樂盒">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
            position: relative;
        }
        .flex { display: flex; }
        .justify-between { justify-content: space-between; }
        .items-center { align-items: center; }
        .text-center { text-align: center; }
        .mb-6 { margin-bottom: 1.5rem; }
        .text-purple-400 { color: #a855f7; }
        
        #dropZone {
            border: 2px dashed rgba(168, 85, 247, 0.3);
            border-radius: 1rem;
            padding: 1rem;
            cursor: pointer;
            background: rgba(168, 85, 247, 0.05);
            transition: 0.3s;
            margin-bottom: 1rem;
        }
        #dropZone:hover { background: rgba(168, 85, 247, 0.1); border-color: #a855f7; }
        #dropZone.highlight { border-color: #f59e0b; background: rgba(245, 158, 11, 0.15); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .mode-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: #cbd5e1; padding: 6px; border-radius: 8px; font-size: 11px; cursor: pointer;
        }
        .mode-btn:hover { background: rgba(168, 85, 247, 0.2); }

        #disk {
            width: 7.5rem; height: 7.5rem;
            margin: 0 auto 1rem;
            background: rgba(88, 28, 135, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(168, 85, 247, 0.2);
            position: relative;
            overflow: hidden;
        }
        .animate-spin { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        input[type="range"] {
            width: 100%; height: 6px; border-radius: 5px; background: #475569;
            accent-color: #a855f7; margin: 1rem 0 0.5rem; appearance: none;
        }

        .controls button { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 0.5rem; }
        .play-btn {
            background: #a855f7 !important; color: white !important; border-radius: 50%;
            width: 3.5rem; height: 3.5rem; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 15px rgba(168, 85, 247, 0.4);
        }
        .play-btn:disabled { background: #475569 !important; opacity: 0.5; box-shadow: none; }

        #playlist {
            list-style: none; padding: 0; max-height: 120px; overflow-y: auto;
            border-top: 1px solid rgba(255,255,255,0.1); margin-top: 1rem;
        }
        #playlist li {
            padding: 0.6rem; font-size: 0.8rem; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        #playlist li.active { color: #a855f7; background: rgba(168, 85, 247, 0.1); font-weight: bold; }

        .shortcuts-panel { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .shortcut-title { font-size: 0.7rem; color: #64748b; margin-bottom: 0.6rem; font-weight: bold; }
        .shortcut-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
        .shortcut-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px; padding: 0.6rem 0.3rem; text-align: center; cursor: pointer;
        }
        .shortcut-item.ready { border-color: #a855f7; background: rgba(168, 85, 247, 0.15); box-shadow: 0 0 10px rgba(168,85,247,0.2); }
        .shortcut-item .name { font-size: 10px; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .shortcut-item .status { font-size: 8px; color: #64748b; margin-top: 2px; }
        .ready .status { color: #a855f7; font-weight: bold; }

        #toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: #a855f7; color: white; padding: 6px 16px;
            border-radius: 20px; font-size: 11px; display: none; z-index: 100;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div id="toast">提示訊息</div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-purple-400 font-bold" style="margin:0; font-size: 1.1rem;">私人音樂盒</h2>
            <div id="timerDisplay" style="font-size: 10px; color: #a855f7; font-family: monospace;"></div>
        </div>

        <div id="dropZone" class="text-center">
            <div id="uploadHint" style="font-size: 0.75rem; color: #94a3b8; line-height: 1.4;">
                <b style="color:#e2e8f0">載入音檔以開始播放</b><br>建議直接開啟整個資料夾
            </div>
            <div class="btn-group">
                <button class="mode-btn" onclick="event.stopPropagation(); $('fileInput').click()">選取檔案</button>
                <button class="mode-btn" onclick="event.stopPropagation(); $('folderInput').click()">開啟資料夾</button>
            </div>
            <input type="file" id="fileInput" multiple accept="audio/*" style="display: none;">
            <input type="file" id="folderInput" webkitdirectory directory style="display: none;">
        </div>

        <div class="text-center">
            <div id="disk">
                <svg id="musicIcon" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="1.5"><path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
            </div>
            
            <div id="trackName" style="font-weight: bold; font-size: 0.95rem; margin-bottom: 0.4rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">尚未連線檔案</div>
            
            <input type="range" id="progressBar" min="0" max="100" value="0">
            
            <div class="flex justify-between" style="font-size: 10px; color: #94a3b8; font-family: monospace; margin-bottom: 0.8rem;">
                <span id="curTime">00:00</span>
                <span id="durTime">00:00</span>
            </div>

            <div class="flex items-center justify-between controls">
                <button id="prevBtn"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button id="playBtn" class="play-btn" disabled>
                    <svg id="playIcon" width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" class="hidden" width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="nextBtn"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>
        </div>

        <ul id="playlist"></ul>

        <div class="shortcuts-panel">
            <div class="shortcut-title">常用捷徑 (連線後自動啟動)</div>
            <div id="shortcutGrid" class="shortcut-grid"></div>
        </div>

        <audio id="audio" style="display: none;"></audio>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const audio = $('audio');
        let tracks = [], currentIndex = -1;

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            renderShortcuts();
            const last = JSON.parse(localStorage.getItem('last_played_session') || 'null');
            if (last) {
                $('trackName').textContent = "上次暫停：" + last.name.replace(/\.[^/.]+$/, "");
                $('curTime').textContent = fmt(last.time);
            }
        });

        // 處理載入檔案
        const handleFiles = (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/') || f.name.match(/\.(mp3|m4a|wav|aac)$/i));
            if (!files.length) return;
            
            tracks = files;
            $('playBtn').disabled = false;
            
            const last = JSON.parse(localStorage.getItem('last_played_session') || 'null');
            const targetName = last ? last.name : null;
            
            updatePlaylistUI(targetName);
            renderShortcuts(); // 載入檔案後更新捷徑狀態
            
            let foundIdx = tracks.findIndex(t => t.name === targetName);
            if (foundIdx !== -1) {
                loadTrack(foundIdx, true);
                showToast("已自動接續上次進度");
            } else {
                loadTrack(0, false);
                showToast(`已成功載入 ${tracks.length} 個音檔`);
            }
            $('uploadHint').innerHTML = `<b style="color:#a855f7">已連線資料夾</b><br>共計 ${tracks.length} 個演講檔案`;
        };

        $('fileInput').onchange = handleFiles;
        $('folderInput').onchange = handleFiles;
        $('dropZone').onclick = () => $('folderInput').click(); // 預設點擊區塊為開啟資料夾

        function loadTrack(i, shouldPlay) {
            if (!tracks[i]) return;
            currentIndex = i;
            const file = tracks[i];
            
            if (audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(file);
            $('trackName').textContent = file.name.replace(/\.[^/.]+$/, "");
            
            const items = $('playlist').querySelectorAll('li');
            items.forEach((li, idx) => li.classList.toggle('active', idx === i));
            
            audio.onloadedmetadata = () => {
                $('durTime').textContent = fmt(audio.duration);
                const history = JSON.parse(localStorage.getItem('multi_music_history') || '{}');
                if (history[file.name] > 2) audio.currentTime = history[file.name];
                if (shouldPlay) playTrack();
            };
        }

        function quickLoad(fileName) {
            const foundIdx = tracks.findIndex(t => t.name === fileName);
            if (foundIdx !== -1) {
                loadTrack(foundIdx, true);
            } else {
                const history = JSON.parse(localStorage.getItem('multi_music_history') || '{}');
                localStorage.setItem('last_played_session', JSON.stringify({ name: fileName, time: history[fileName] || 0 }));
                $('trackName').textContent = "選取資料夾以解鎖：" + fileName.replace(/\.[^/.]+$/, "");
                $('curTime').textContent = fmt(history[fileName] || 0);
                $('dropZone').classList.add('highlight');
                showToast("請點擊上方開啟檔案所在的資料夾");
                setTimeout(() => $('dropZone').classList.remove('highlight'), 3000);
            }
        }

        function renderShortcuts() {
            const pins = JSON.parse(localStorage.getItem('pinned_files') || '[]');
            const history = JSON.parse(localStorage.getItem('multi_music_history') || '{}');
            const grid = $('shortcutGrid');
            if (!pins.length) { grid.innerHTML = '<div style="grid-column:span 3; font-size:9px; opacity:0.4;">清單中點擊圖釘加入捷徑</div>'; return; }
            
            grid.innerHTML = pins.map(name => {
                const isReady = tracks.some(t => t.name === name);
                return `
                <div class="shortcut-item ${isReady ? 'ready' : ''}" onclick="quickLoad('${name}')">
                    <div class="name">${name.replace(/\.[^/.]+$/, "")}</div>
                    <div class="status">${isReady ? '● 已連線' : '待連線'}</div>
                </div>
            `}).join('');
        }

        function togglePin(name) {
            let pins = JSON.parse(localStorage.getItem('pinned_files') || '[]');
            const idx = pins.indexOf(name);
            if (idx === -1) { if(pins.length>=3) pins.shift(); pins.push(name); }
            else pins.splice(idx, 1);
            localStorage.setItem('pinned_files', JSON.stringify(pins));
            renderShortcuts();
            updatePlaylistUI(tracks[currentIndex]?.name);
        }

        function updatePlaylistUI(activeName) {
            const pins = JSON.parse(localStorage.getItem('pinned_files') || '[]');
            $('playlist').innerHTML = tracks.map((t, i) => `
                <li class="${t.name === activeName ? 'active' : ''}" onclick="loadTrack(${i}, true)">
                    <div style="flex:1; overflow:hidden; text-overflow:ellipsis;">${i+1}. ${t.name.replace(/\.[^/.]+$/, "")}</div>
                    <button style="background:none; border:none; color:${pins.includes(t.name)?'#f59e0b':'#475569'}; cursor:pointer;" onclick="event.stopPropagation(); togglePin('${t.name}')">
                        <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
                    </button>
                </li>
            `).join('');
        }

        audio.ontimeupdate = () => {
            if (!audio.duration || !tracks[currentIndex]) return;
            const cur = audio.currentTime;
            $('progressBar').value = (cur / audio.duration) * 100;
            $('curTime').textContent = fmt(cur);
            const history = JSON.parse(localStorage.getItem('multi_music_history') || '{}');
            history[tracks[currentIndex].name] = cur;
            localStorage.setItem('multi_music_history', JSON.stringify(history));
            localStorage.setItem('last_played_session', JSON.stringify({ name: tracks[currentIndex].name, time: cur }));
        };

        function playTrack() { audio.play(); $('playIcon').classList.add('hidden'); $('pauseIcon').classList.remove('hidden'); $('musicIcon').classList.add('animate-spin'); }
        function pauseTrack() { audio.pause(); $('playIcon').classList.remove('hidden'); $('pauseIcon').classList.add('hidden'); $('musicIcon').classList.remove('animate-spin'); }
        $('playBtn').onclick = () => audio.paused ? playTrack() : pauseTrack();
        $('nextBtn').onclick = () => loadTrack((currentIndex + 1) % tracks.length, true);
        $('prevBtn').onclick = () => loadTrack((currentIndex - 1 + tracks.length) % tracks.length, true);
        audio.onended = () => $('nextBtn').click();
        $('progressBar').oninput = function() { if(audio.duration) audio.currentTime = (this.value/100)*audio.duration; };
        function fmt(s) { const m=Math.floor(s/60), sec=Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
        function showToast(m) { $('toast').textContent=m; $('toast').style.display='block'; setTimeout(()=>$('toast').style.display='none', 2000); }
    </script>
</body>
</html>
