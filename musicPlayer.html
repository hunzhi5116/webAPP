<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人音樂盒 (捷徑啟動優化版)</title>
    
    <!-- PWA 與圖示設定 -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3844/3844720.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3844/3844720.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="私人音樂盒">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
            position: relative;
        }
        .flex { display: flex; }
        .justify-between { justify-content: space-between; }
        .items-center { align-items: center; }
        .text-center { text-align: center; }
        .mb-6 { margin-bottom: 1.5rem; }
        .text-purple-400 { color: #a855f7; }
        
        #dropZone {
            border: 2px dashed rgba(168, 85, 247, 0.3);
            border-radius: 1rem;
            padding: 1.2rem;
            cursor: pointer;
            background: rgba(168, 85, 247, 0.05);
            transition: 0.3s;
            margin-bottom: 1rem;
        }
        #dropZone.highlight { border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); transform: scale(1.02); }

        #disk {
            width: 8rem; height: 8rem;
            margin: 0 auto 1.2rem;
            background: rgba(88, 28, 135, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(168, 85, 247, 0.2);
            position: relative;
            overflow: hidden;
        }
        .animate-spin { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: #475569;
            accent-color: #a855f7;
            margin: 1.2rem 0 0.5rem;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }

        .controls button {
            background: none; border: none; color: #94a3b8; cursor: pointer;
            padding: 0.5rem; transition: 0.2s;
        }
        
        .play-btn {
            background: #a855f7 !important;
            color: white !important;
            border-radius: 50%;
            width: 4rem; height: 4rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 15px rgba(168, 85, 247, 0.4);
        }
        .play-btn:disabled { background: #475569 !important; opacity: 0.6; cursor: not-allowed; box-shadow: none; }

        #playlist {
            list-style: none; padding: 0; max-height: 120px; overflow-y: auto;
            border-top: 1px solid rgba(255,255,255,0.1); margin-top: 1rem;
        }
        #playlist li {
            padding: 0.7rem; font-size: 0.85rem; color: #94a3b8;
            border-radius: 10px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }
        #playlist li.active { color: #a855f7; background: rgba(168, 85, 247, 0.15); font-weight: bold; }

        .pin-btn { background: none; border: none; color: #64748b; cursor: pointer; padding: 2px; }
        .pin-btn.pinned { color: #f59e0b !important; }

        .shortcuts-panel { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .shortcut-title { font-size: 0.75rem; color: #64748b; margin-bottom: 0.8rem; font-weight: bold; }
        .shortcut-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
        .shortcut-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 0.8rem 0.4rem; text-align: center; cursor: pointer;
            transition: 0.2s;
        }
        .shortcut-item.matching { border-color: #a855f7; background: rgba(168, 85, 247, 0.1); }
        .shortcut-item .name { font-size: 10px; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .shortcut-item .time { font-size: 9px; color: #64748b; font-family: monospace; }

        #toast {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #a855f7; color: white; padding: 6px 12px;
            border-radius: 20px; font-size: 11px; display: none; z-index: 100;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div id="toast">訊息提示</div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-purple-400 font-bold" style="margin:0; font-size: 1.2rem;">私人音樂盒</h2>
            <button id="timerBtn" style="background:none; border:none; color:white; opacity: 0.6;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            </button>
        </div>

        <div id="dropZone" class="text-center">
            <div id="uploadHint" style="font-size: 0.8rem; color: #94a3b8;">點此選取檔案以解鎖播放</div>
            <input type="file" id="fileInput" multiple accept="audio/*" style="display: none;">
        </div>

        <div class="text-center">
            <div id="disk">
                <svg id="musicIcon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="1.5"><path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
            </div>
            
            <div id="trackName" style="font-weight: bold; font-size: 1rem; margin-bottom: 0.5rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">尚未載入</div>
            
            <input type="range" id="progressBar" min="0" max="100" value="0">
            
            <div class="flex justify-between" style="font-size: 10px; color: #94a3b8; font-family: monospace; margin-bottom: 1rem;">
                <span id="curTime">00:00</span>
                <span id="durTime">00:00</span>
            </div>

            <div class="flex items-center justify-between controls">
                <button id="prevBtn"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button id="playBtn" class="play-btn" disabled>
                    <svg id="playIcon" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" class="hidden" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="nextBtn"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>
        </div>

        <ul id="playlist"></ul>

        <div class="shortcuts-panel">
            <div class="shortcut-title">快速啟動捷徑 (需先選檔)</div>
            <div id="shortcutGrid" class="shortcut-grid"></div>
        </div>

        <audio id="audio" style="display: none;"></audio>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const audio = $('audio');
        let tracks = [], currentIndex = -1;

        // 1. 初始化讀取：只讀取「檔名」與「進度」用於顯示
        window.addEventListener('DOMContentLoaded', () => {
            renderShortcuts();
            const lastSession = JSON.parse(localStorage.getItem('last_played_session') || 'null');
            if (lastSession) {
                $('trackName').textContent = lastSession.name.replace(/\.[^/.]+$/, "");
                $('curTime').textContent = fmt(lastSession.time);
                $('uploadHint').innerHTML = `上次進度：<span style="color:#f59e0b">${lastSession.name.substring(0,10)}...</span><br><b>點此選取該檔案即可播放</b>`;
            }
        });

        // 2. 核心：選取檔案後觸發比對
        $('dropZone').onclick = () => $('fileInput').click();

        $('fileInput').onchange = (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/') || f.name.match(/\.(mp3|m4a|wav|aac)$/i));
            if (!files.length) return;
            
            tracks = files;
            const lastSession = JSON.parse(localStorage.getItem('last_played_session') || 'null');
            const targetName = lastSession ? lastSession.name : null;
            
            // 啟用播放鈕
            $('playBtn').disabled = false;
            
            // 比對檔名
            let foundIdx = tracks.findIndex(t => t.name === targetName);
            
            updatePlaylistUI(targetName);
            
            if (foundIdx !== -1) {
                loadTrack(foundIdx, true); // 找到就自動播
                showToast("已自動接續播放");
            } else {
                loadTrack(0, false); // 沒找到就載入第一個，等使用者點
                showToast(`已載入 ${tracks.length} 個檔案`);
            }
            $('uploadHint').textContent = "檔案已載入，可隨時切換";
        };

        function loadTrack(i, shouldPlay) {
            if (!tracks[i]) return;
            currentIndex = i;
            const file = tracks[currentIndex];
            
            if (audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(file);
            $('trackName').textContent = file.name.replace(/\.[^/.]+$/, "");
            
            const items = $('playlist').querySelectorAll('li');
            items.forEach((li, idx) => li.classList.toggle('active', idx === i));
            
            audio.onloadedmetadata = () => {
                $('durTime').textContent = fmt(audio.duration);
                const history = JSON.parse(localStorage.getItem('multi_music_history') || '{}');
                if (history[file.name] > 2) {
                    audio.currentTime = history[file.name];
                }
                if (shouldPlay) playTrack();
            };
        }

        // 3. 捷徑點擊：如果沒載入檔案，就引導使用者選檔
        function quickLoad(fileName) {
            const foundIdx = tracks.findIndex(t => t.name === fileName);
            if (foundIdx !== -1) {
                loadTrack(foundIdx, true);
            } else {
                // 存入預備狀態，並高亮選檔區
                const history = JSON.parse(localStorage.getItem('multi_music_history') || '{}');
                localStorage.setItem('last_played_session', JSON.stringify({ name: fileName, time: history[fileName] || 0 }));
                
                $('trackName').textContent = fileName.replace(/\.[^/.]+$/, "");
                $('curTime').textContent = fmt(history[fileName] || 0);
                $('uploadHint').innerHTML = `目標：<span style="color:#f59e0b">${fileName.substring(0,10)}...</span><br><b>請點此選取該檔案</b>`;
                
                $('dropZone').classList.add('highlight');
                showToast("請選取檔案以解鎖存取權");
                setTimeout(() => $('dropZone').classList.remove('highlight'), 3000);
            }
        }

        // --- 以下為基礎功能支援 ---

        function renderShortcuts() {
            const pins = JSON.parse(localStorage.getItem('pinned_files') || '[]');
            const history = JSON.parse(localStorage.getItem('multi_music_history') || '{}');
            const grid = $('shortcutGrid');
            if (!pins.length) { grid.innerHTML = '<div style="grid-column:span 3; font-size:10px; opacity:0.4;">清單中點擊圖釘可加入</div>'; return; }
            grid.innerHTML = pins.map(name => `
                <div class="shortcut-item" onclick="quickLoad('${name}')">
                    <div class="name">${name.replace(/\.[^/.]+$/, "")}</div>
                    <div class="time">${fmt(history[name] || 0)}</div>
                </div>
            `).join('');
        }

        function togglePin(name) {
            let pins = JSON.parse(localStorage.getItem('pinned_files') || '[]');
            const idx = pins.indexOf(name);
            if (idx === -1) { if(pins.length>=3) pins.shift(); pins.push(name); }
            else pins.splice(idx, 1);
            localStorage.setItem('pinned_files', JSON.stringify(pins));
            renderShortcuts();
            updatePlaylistUI(name);
        }

        function updatePlaylistUI(activeName) {
            const pins = JSON.parse(localStorage.getItem('pinned_files') || '[]');
            $('playlist').innerHTML = tracks.map((t, i) => `
                <li class="${t.name === activeName ? 'active' : ''}" onclick="loadTrack(${i}, true)">
                    <div style="flex:1; overflow:hidden; text-overflow:ellipsis;">${i+1}. ${t.name.replace(/\.[^/.]+$/, "")}</div>
                    <button class="pin-btn ${pins.includes(t.name)?'pinned':''}" onclick="event.stopPropagation(); togglePin('${t.name}')">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10V8a2 2 0 00-2-2H5a2 2 0 00-2 2v2M7 10v10a2 2 0 002 2h6a2 2 0 002-2V10M12 6V3M12 21v-3"/></svg>
                    </button>
                </li>
            `).join('');
        }

        audio.ontimeupdate = () => {
            if (!audio.duration || !tracks[currentIndex]) return;
            const cur = audio.currentTime;
            $('progressBar').value = (cur / audio.duration) * 100;
            $('curTime').textContent = fmt(cur);
            
            // 存儲紀錄
            const history = JSON.parse(localStorage.getItem('multi_music_history') || '{}');
            history[tracks[currentIndex].name] = cur;
            localStorage.setItem('multi_music_history', JSON.stringify(history));
            localStorage.setItem('last_played_session', JSON.stringify({ name: tracks[currentIndex].name, time: cur }));
            if (Math.floor(cur) % 10 === 0) renderShortcuts();
        };

        function playTrack() { audio.play(); $('playIcon').classList.add('hidden'); $('pauseIcon').classList.remove('hidden'); $('musicIcon').classList.add('animate-spin'); }
        function pauseTrack() { audio.pause(); $('playIcon').classList.remove('hidden'); $('pauseIcon').classList.add('hidden'); $('musicIcon').classList.remove('animate-spin'); }
        $('playBtn').onclick = () => audio.paused ? playTrack() : pauseTrack();
        $('nextBtn').onclick = () => loadTrack((currentIndex + 1) % tracks.length, true);
        $('prevBtn').onclick = () => loadTrack((currentIndex - 1 + tracks.length) % tracks.length, true);
        audio.onended = () => $('nextBtn').click();
        $('progressBar').oninput = function() { if(audio.duration) audio.currentTime = (this.value/100)*audio.duration; };
        function fmt(s) { const m=Math.floor(s/60), sec=Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
        function showToast(m) { $('toast').textContent=m; $('toast').style.display='block'; setTimeout(()=>$('toast').style.display='none', 2000); }
    </script>
</body>
</html>
