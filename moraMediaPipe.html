<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猜拳手勢辨識 (剪刀、石頭、布)</title>
    <!-- 引入 Tailwind CSS 以快速設計 RWD 響應式介面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 讓畫面呈現鏡像（左右反轉），符合一般手機前置鏡頭的使用直覺 */
        .mirror-view {
            transform: scaleX(-1);
            -webkit-transform: scaleX(-1);
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 flex flex-col items-center">
        <!-- 標題與狀態 -->
        <h1 class="text-2xl font-black mb-2 tracking-wider text-blue-400">猜拳手勢辨識</h1>
        <div id="status" class="text-sm mb-4 text-yellow-400 bg-gray-700 px-3 py-1 rounded-full">
            ⏳ 正在載入 AI 模型，請稍候...
        </div>

        <!-- 遊戲計分板 -->
        <div class="flex justify-between w-full px-4 mb-4 text-lg font-bold">
            <div class="text-blue-400">玩家: <span id="player_score">0</span></div>
            <div class="text-red-400">電腦: <span id="comp_score">0</span></div>
        </div>

        <!-- 電腦出拳區 -->
        <div class="flex flex-col items-center mb-4">
            <span class="text-sm text-gray-400 mb-1">電腦出拳</span>
            <div id="comp_choice" class="text-5xl bg-gray-700 w-24 h-24 flex items-center justify-center rounded-full shadow-inner border-2 border-gray-600 transition-all">🤖</div>
        </div>

        <!-- 遊戲結果訊息 -->
        <div id="game_message" class="text-2xl font-black text-white mb-4 h-8 animate-pulse drop-shadow-md">請先開啟相機！</div>

        <!-- 辨識結果顯示區 -->
        <div class="h-20 flex items-center justify-center w-full bg-gray-900 rounded-xl mb-6 shadow-inner border border-gray-700">
            <span id="gesture_output" class="text-xl text-gray-500 font-bold">等待相機開啟...</span>
        </div>

        <!-- 影像與畫布容器 -->
        <div class="relative w-full bg-black rounded-xl overflow-hidden border-2 border-gray-700 shadow-lg" style="aspect-ratio: 3/4;">
            <!-- video 設定 playsinline 確保在 iOS 不會自動全螢幕 -->
            <video id="webcam" class="absolute top-0 left-0 w-full h-full object-cover mirror-view" autoplay playsinline></video>
            <!-- canvas 用來繪製手部骨架 -->
            <canvas id="output_canvas" class="absolute top-0 left-0 w-full h-full object-cover mirror-view"></canvas>
        </div>

        <!-- 控制按鈕 -->
        <div class="w-full flex gap-3 mt-6">
            <button id="enable_webcam" class="bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold py-3 px-4 rounded-full w-full transition-colors duration-300 hidden shadow-lg shadow-blue-500/30">
                📷 開啟相機
            </button>
            <button id="play_game_btn" class="bg-green-600 hover:bg-green-500 active:bg-green-700 text-white font-bold py-3 px-4 rounded-full w-full transition-colors duration-300 hidden shadow-lg shadow-green-500/30">
                🎮 開始猜拳
            </button>
        </div>
    </div>

    <!-- 匯入 MediaPipe 模組 -->
    <script type="module">
        import {
            GestureRecognizer,
            FilesetResolver,
            DrawingUtils
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // DOM 元素取得
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const gestureOutput = document.getElementById("gesture_output");
        const statusText = document.getElementById("status");
        const enableWebcamButton = document.getElementById("enable_webcam");

        // 遊戲相關 DOM 與變數
        const playGameBtn = document.getElementById("play_game_btn");
        const playerScoreEl = document.getElementById("player_score");
        const compScoreEl = document.getElementById("comp_score");
        const compChoiceEl = document.getElementById("comp_choice");
        const gameMessageEl = document.getElementById("game_message");

        let currentDetectedGesture = null;
        let playerScore = 0;
        let compScore = 0;
        let isPlaying = false;

        let gestureRecognizer;
        let runningMode = "VIDEO";
        let webcamRunning = false;
        let lastVideoTime = -1;

        // 步驟 1：載入 MediaPipe 猜拳手勢辨識模型
        async function loadModel() {
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        // 使用官方訓練好的手勢辨識模型 (支援剪刀、石頭、布、讚等)
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                        delegate: "GPU"
                    },
                    runningMode: runningMode
                });

                // 模型載入成功，更新 UI
                statusText.innerHTML = "✅ 模型載入完成";
                statusText.classList.replace("text-yellow-400", "text-green-400");
                enableWebcamButton.classList.remove("hidden");
            } catch (error) {
                console.error(error);
                statusText.innerHTML = "❌ 模型載入失敗，請檢查網路連線";
                statusText.classList.replace("text-yellow-400", "text-red-500");
            }
        }
        loadModel();

        // 步驟 2：檢查瀏覽器是否支援相機
        function hasGetUserMedia() {
            return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
        }

        if (hasGetUserMedia()) {
            enableWebcamButton.addEventListener("click", toggleCamera);
        } else {
            statusText.innerHTML = "❌ 您的瀏覽器不支援相機功能";
            statusText.classList.replace("text-yellow-400", "text-red-500");
        }

        // 步驟 3：開啟或關閉相機
        function toggleCamera() {
            if (!gestureRecognizer) {
                alert("請稍候，AI 模型尚未載入完成！");
                return;
            }

            if (webcamRunning) {
                // 停止相機
                webcamRunning = false;
                enableWebcamButton.innerHTML = "📷 開啟相機";
                enableWebcamButton.classList.replace("bg-red-600", "bg-blue-600");
                enableWebcamButton.classList.replace("hover:bg-red-500", "hover:bg-blue-500");
                
                const stream = video.srcObject;
                if(stream) {
                    const tracks = stream.getTracks();
                    tracks.forEach(track => track.stop());
                }
                video.srcObject = null;
                gestureOutput.innerHTML = "相機已暫停";
                gestureOutput.className = "text-xl text-gray-500 font-bold";
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                playGameBtn.classList.add("hidden");
                gameMessageEl.innerHTML = "請先開啟相機！";
                gameMessageEl.className = "text-2xl font-black text-gray-400 mb-4 h-8";
            } else {
                // 啟動相機
                webcamRunning = true;
                enableWebcamButton.innerHTML = "🛑 暫停相機";
                enableWebcamButton.classList.replace("bg-blue-600", "bg-red-600");
                enableWebcamButton.classList.replace("hover:bg-blue-500", "hover:bg-red-500");
                gestureOutput.innerHTML = "請將手舉到鏡頭前...";
                playGameBtn.classList.remove("hidden");
                gameMessageEl.innerHTML = "準備好就按開始！";
                gameMessageEl.className = "text-2xl font-black text-white mb-4 h-8 animate-pulse drop-shadow-md";

                // 強制要求使用前置鏡頭 (facingMode: "user")
                const constraints = { video: { facingMode: "user" } };

                navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", predictWebcam);
                }).catch((err) => {
                    console.error(err);
                    statusText.innerHTML = "❌ 無法存取相機，請允許權限";
                    statusText.classList.replace("text-green-400", "text-red-500");
                    webcamRunning = false;
                });
            }
        }

        // 步驟 4：持續預測影像幀
        async function predictWebcam() {
            if (!webcamRunning) return;

            // 確保畫布尺寸與影片原始尺寸一致，才能精準畫出骨架
            if (canvasElement.width !== video.videoWidth) {
                canvasElement.width = video.videoWidth;
                canvasElement.height = video.videoHeight;
            }

            let nowInMs = Date.now();
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                // 將當前影像幀交給 MediaPipe 辨識
                const results = gestureRecognizer.recognizeForVideo(video, nowInMs);

                canvasCtx.save();
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                const drawingUtils = new DrawingUtils(canvasCtx);

                // 如果有偵測到手部，畫出骨架連線
                if (results.landmarks && results.landmarks.length > 0) {
                    for (const landmarks of results.landmarks) {
                        drawingUtils.drawConnectors(
                            landmarks,
                            GestureRecognizer.HAND_CONNECTIONS,
                            { color: "#00FF00", lineWidth: 4 } // 綠色連線
                        );
                        drawingUtils.drawLandmarks(landmarks, {
                            color: "#FF0000", // 紅色關節點
                            lineWidth: 2,
                            radius: 3
                        });
                    }
                }

                // 判斷手勢結果
                if (results.gestures && results.gestures.length > 0) {
                    const categoryName = results.gestures[0][0].categoryName;
                    
                    if (categoryName === "Closed_Fist") {
                        currentDetectedGesture = "Closed_Fist";
                        gestureOutput.innerHTML = "石頭 ✊";
                        gestureOutput.className = "text-5xl font-black text-yellow-400 drop-shadow-[0_0_10px_rgba(250,204,21,0.8)] transition-all scale-110";
                    } else if (categoryName === "Open_Palm") {
                        currentDetectedGesture = "Open_Palm";
                        gestureOutput.innerHTML = "布 🖐️";
                        gestureOutput.className = "text-5xl font-black text-blue-400 drop-shadow-[0_0_10px_rgba(96,165,250,0.8)] transition-all scale-110";
                    } else if (categoryName === "Victory") {
                        currentDetectedGesture = "Victory";
                        gestureOutput.innerHTML = "剪刀 ✌️";
                        gestureOutput.className = "text-5xl font-black text-pink-400 drop-shadow-[0_0_10px_rgba(244,114,182,0.8)] transition-all scale-110";
                    } else {
                        // 偵測到手，但不是猜拳手勢
                        currentDetectedGesture = null;
                        gestureOutput.innerHTML = "辨識中...";
                        gestureOutput.className = "text-xl text-gray-400 font-bold transition-none scale-100";
                    }
                } else {
                    currentDetectedGesture = null;
                    gestureOutput.innerHTML = "請將手舉到鏡頭前...";
                    gestureOutput.className = "text-xl text-gray-500 font-bold transition-none scale-100";
                }
                canvasCtx.restore();
            }

            // 透過 requestAnimationFrame 不斷循環執行
            if (webcamRunning === true) {
                window.requestAnimationFrame(predictWebcam);
            }
        }

        // 遊戲核心邏輯：倒數與判定勝負
        playGameBtn.addEventListener("click", () => {
            if (!webcamRunning) return alert("請先開啟相機！");
            if (isPlaying) return;
            isPlaying = true;
            playGameBtn.disabled = true;
            playGameBtn.classList.replace("bg-green-600", "bg-gray-500");
            
            let count = 3;
            compChoiceEl.innerHTML = "🤔";
            compChoiceEl.classList.add("animate-bounce");
            gameMessageEl.innerHTML = `倒數... ${count}`;
            gameMessageEl.className = "text-3xl font-black text-yellow-400 mb-4 h-8 drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]";

            const countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    gameMessageEl.innerHTML = `倒數... ${count}`;
                } else {
                    clearInterval(countdownInterval);
                    resolveGame();
                }
            }, 1000);
        });

        function resolveGame() {
            isPlaying = false;
            playGameBtn.disabled = false;
            playGameBtn.classList.replace("bg-gray-500", "bg-green-600");
            compChoiceEl.classList.remove("animate-bounce");
            
            if (!currentDetectedGesture) {
                gameMessageEl.innerHTML = "❌ 沒看到手勢！重來";
                gameMessageEl.className = "text-2xl font-black text-red-500 mb-4 h-8";
                compChoiceEl.innerHTML = "🤖";
                return;
            }

            const choices = ["Closed_Fist", "Open_Palm", "Victory"];
            const compChoice = choices[Math.floor(Math.random() * choices.length)];
            
            // 顯示電腦出拳
            if (compChoice === "Closed_Fist") compChoiceEl.innerHTML = "✊";
            else if (compChoice === "Open_Palm") compChoiceEl.innerHTML = "🖐️";
            else if (compChoice === "Victory") compChoiceEl.innerHTML = "✌️";

            // 判斷勝負
            if (currentDetectedGesture === compChoice) {
                gameMessageEl.innerHTML = "🤝 平手！";
                gameMessageEl.className = "text-2xl font-black text-gray-300 mb-4 h-8 drop-shadow-md scale-110 transition-transform";
            } else if (
                (currentDetectedGesture === "Closed_Fist" && compChoice === "Victory") ||
                (currentDetectedGesture === "Open_Palm" && compChoice === "Closed_Fist") ||
                (currentDetectedGesture === "Victory" && compChoice === "Open_Palm")
            ) {
                gameMessageEl.innerHTML = "🎉 你贏了！";
                gameMessageEl.className = "text-2xl font-black text-green-400 mb-4 h-8 drop-shadow-[0_0_10px_rgba(74,222,128,0.8)] scale-110 transition-transform";
                playerScore++;
                playerScoreEl.innerText = playerScore;
            } else {
                gameMessageEl.innerHTML = "😭 你輸了！";
                gameMessageEl.className = "text-2xl font-black text-red-400 mb-4 h-8 drop-shadow-[0_0_10px_rgba(248,113,113,0.8)] scale-110 transition-transform";
                compScore++;
                compScoreEl.innerText = compScore;
            }
        }
    </script>
</body>
</html>
