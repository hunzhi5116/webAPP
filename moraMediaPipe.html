<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猜拳手勢辨識 (剪刀、石頭、布)</title>
    <!-- 引入 Tailwind CSS 以快速設計 RWD 響應式介面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 讓畫面呈現鏡像（左右反轉），符合一般手機前置鏡頭的使用直覺 */
        .mirror-view {
            transform: scaleX(-1);
            -webkit-transform: scaleX(-1);
        }
    </style>
</head>
<body class="bg-gray-900 text-white h-[100dvh] overflow-hidden flex flex-col items-center justify-start p-3">

    <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-2xl p-4 flex flex-col h-full">
        <!-- 頂部：標題與狀態 -->
        <div class="flex justify-between items-center mb-3 shrink-0">
            <h1 class="text-xl font-black tracking-wider text-blue-400">猜拳遊戲</h1>
            <div id="status" class="text-xs font-bold text-yellow-400 bg-gray-700 px-2 py-1 rounded-md">
                ⏳ 載入中...
            </div>
        </div>

        <!-- 戰況區 (分數與對決) -->
        <div class="bg-gray-900 rounded-xl p-3 mb-3 border border-gray-700 shadow-inner shrink-0">
            <!-- 分數與訊息 -->
            <div class="flex justify-between items-end w-full mb-2">
                <div class="text-xs text-blue-400 font-bold flex flex-col items-center w-1/4">玩家 <span id="player_score" class="text-2xl text-white">0</span></div>
                <div id="game_message" class="text-base font-black text-white h-6 animate-pulse text-center flex-1 mx-2 truncate leading-6 mt-2">請開啟相機</div>
                <div class="text-xs text-red-400 font-bold flex flex-col items-center w-1/4">電腦 <span id="comp_score" class="text-2xl text-white">0</span></div>
            </div>
            
            <!-- 雙方出拳顯示 -->
            <div class="flex items-center justify-around w-full mt-2">
                <div class="flex flex-col items-center w-1/3">
                    <div id="gesture_output" class="text-5xl drop-shadow-md transition-all h-14 flex items-center justify-center">❓</div>
                    <span class="text-[10px] text-gray-500 mt-1">你的手勢</span>
                </div>
                <div class="text-xl font-black text-gray-600 italic">VS</div>
                <div class="flex flex-col items-center w-1/3">
                    <div id="comp_choice" class="text-5xl drop-shadow-md transition-all h-14 flex items-center justify-center">🤖</div>
                    <span class="text-[10px] text-gray-500 mt-1">電腦出拳</span>
                </div>
            </div>
        </div>

        <!-- 影像與畫布容器 (彈性填滿剩餘空間) -->
        <div class="relative w-full flex-1 bg-black rounded-xl overflow-hidden border-2 border-gray-700 shadow-lg min-h-0">
            <video id="webcam" class="absolute inset-0 w-full h-full object-cover mirror-view" autoplay playsinline></video>
            <canvas id="output_canvas" class="absolute inset-0 w-full h-full object-cover mirror-view"></canvas>
        </div>

        <!-- 控制按鈕 -->
        <div class="w-full flex gap-3 mt-3 h-14 shrink-0">
            <button id="enable_webcam" class="flex-1 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold rounded-xl transition-colors duration-300 hidden shadow-lg text-sm">
                📷 開啟相機
            </button>
            <button id="play_game_btn" class="flex-1 bg-green-600 hover:bg-green-500 active:bg-green-700 text-white font-bold rounded-xl transition-colors duration-300 hidden shadow-lg text-sm">
                🎮 開始猜拳
            </button>
        </div>
    </div>

    <!-- 匯入 MediaPipe 模組 -->
    <script type="module">
        import {
            GestureRecognizer,
            FilesetResolver,
            DrawingUtils
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // DOM 元素取得
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const gestureOutput = document.getElementById("gesture_output");
        const statusText = document.getElementById("status");
        const enableWebcamButton = document.getElementById("enable_webcam");

        // 遊戲相關 DOM 與變數
        const playGameBtn = document.getElementById("play_game_btn");
        const playerScoreEl = document.getElementById("player_score");
        const compScoreEl = document.getElementById("comp_score");
        const compChoiceEl = document.getElementById("comp_choice");
        const gameMessageEl = document.getElementById("game_message");

        let currentDetectedGesture = null;
        let playerScore = 0;
        let compScore = 0;
        let isPlaying = false;

        let gestureRecognizer;
        let runningMode = "VIDEO";
        let webcamRunning = false;
        let lastVideoTime = -1;

        // 步驟 1：載入 MediaPipe 猜拳手勢辨識模型
        async function loadModel() {
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        // 使用官方訓練好的手勢辨識模型 (支援剪刀、石頭、布、讚等)
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                        delegate: "GPU"
                    },
                    runningMode: runningMode
                });

                // 模型載入成功，更新 UI
                statusText.innerHTML = "✅ 模型載入完成";
                statusText.classList.replace("text-yellow-400", "text-green-400");
                enableWebcamButton.classList.remove("hidden");
            } catch (error) {
                console.error(error);
                statusText.innerHTML = "❌ 模型載入失敗，請檢查網路連線";
                statusText.classList.replace("text-yellow-400", "text-red-500");
            }
        }
        loadModel();

        // 步驟 2：檢查瀏覽器是否支援相機
        function hasGetUserMedia() {
            return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
        }

        if (hasGetUserMedia()) {
            enableWebcamButton.addEventListener("click", toggleCamera);
        } else {
            statusText.innerHTML = "❌ 您的瀏覽器不支援相機功能";
            statusText.classList.replace("text-yellow-400", "text-red-500");
        }

        // 步驟 3：開啟或關閉相機
        function toggleCamera() {
            if (!gestureRecognizer) {
                alert("請稍候，AI 模型尚未載入完成！");
                return;
            }

            if (webcamRunning) {
                // 停止相機
                webcamRunning = false;
                enableWebcamButton.innerHTML = "📷 開啟相機";
                enableWebcamButton.classList.replace("bg-red-600", "bg-blue-600");
                enableWebcamButton.classList.replace("hover:bg-red-500", "hover:bg-blue-500");
                
                const stream = video.srcObject;
                if(stream) {
                    const tracks = stream.getTracks();
                    tracks.forEach(track => track.stop());
                }
                video.srcObject = null;
                gestureOutput.innerHTML = "❓";
                gestureOutput.className = "text-5xl drop-shadow-md grayscale opacity-50 h-14 flex items-center justify-center";
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                playGameBtn.classList.add("hidden");
                gameMessageEl.innerHTML = "請開啟相機";
                gameMessageEl.className = "text-base font-black text-gray-400 h-6 text-center flex-1 mx-2 truncate leading-6 mt-2";
            } else {
                // 啟動相機
                webcamRunning = true;
                enableWebcamButton.innerHTML = "🛑 暫停相機";
                enableWebcamButton.classList.replace("bg-blue-600", "bg-red-600");
                enableWebcamButton.classList.replace("hover:bg-blue-500", "hover:bg-red-500");
                gestureOutput.innerHTML = "🖐️";
                gestureOutput.className = "text-5xl drop-shadow-md grayscale opacity-50 h-14 flex items-center justify-center animate-pulse";
                playGameBtn.classList.remove("hidden");
                gameMessageEl.innerHTML = "準備好就按開始！";
                gameMessageEl.className = "text-base font-black text-white h-6 animate-pulse text-center flex-1 mx-2 truncate leading-6 mt-2";

                // 強制要求使用前置鏡頭 (facingMode: "user")
                const constraints = { video: { facingMode: "user" } };

                navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", predictWebcam);
                }).catch((err) => {
                    console.error(err);
                    statusText.innerHTML = "❌ 無法存取相機，請允許權限";
                    statusText.classList.replace("text-green-400", "text-red-500");
                    
                    // 發生錯誤時，將按鈕與狀態恢復到「未開啟」的狀態
                    webcamRunning = false;
                    enableWebcamButton.innerHTML = "📷 開啟相機";
                    enableWebcamButton.classList.replace("bg-red-600", "bg-blue-600");
                    enableWebcamButton.classList.replace("hover:bg-red-500", "hover:bg-blue-500");
                    playGameBtn.classList.add("hidden");
                    gameMessageEl.innerHTML = "請解除相機封鎖並重試";
                    gameMessageEl.className = "text-base font-black text-red-400 h-6 text-center flex-1 mx-2 truncate leading-6 mt-2";
                    gestureOutput.innerHTML = "❓";
                    gestureOutput.className = "text-5xl drop-shadow-md grayscale opacity-50 h-14 flex items-center justify-center animate-none";
                });
            }
        }

        // 步驟 4：持續預測影像幀
        async function predictWebcam() {
            if (!webcamRunning) return;

            // 確保畫布尺寸與影片原始尺寸一致，才能精準畫出骨架
            if (canvasElement.width !== video.videoWidth) {
                canvasElement.width = video.videoWidth;
                canvasElement.height = video.videoHeight;
            }

            let nowInMs = Date.now();
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                // 將當前影像幀交給 MediaPipe 辨識
                const results = gestureRecognizer.recognizeForVideo(video, nowInMs);

                canvasCtx.save();
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                const drawingUtils = new DrawingUtils(canvasCtx);

                // 如果有偵測到手部，畫出骨架連線
                if (results.landmarks && results.landmarks.length > 0) {
                    for (const landmarks of results.landmarks) {
                        drawingUtils.drawConnectors(
                            landmarks,
                            GestureRecognizer.HAND_CONNECTIONS,
                            { color: "#00FF00", lineWidth: 4 } // 綠色連線
                        );
                        drawingUtils.drawLandmarks(landmarks, {
                            color: "#FF0000", // 紅色關節點
                            lineWidth: 2,
                            radius: 3
                        });
                    }
                }

                // 判斷手勢結果
                if (results.gestures && results.gestures.length > 0) {
                    const categoryName = results.gestures[0][0].categoryName;
                    
                    if (categoryName === "Closed_Fist") {
                        currentDetectedGesture = "Closed_Fist";
                        gestureOutput.innerHTML = "✊";
                        gestureOutput.className = "text-5xl drop-shadow-[0_0_10px_rgba(250,204,21,0.8)] transition-all scale-110 h-14 flex items-center justify-center";
                    } else if (categoryName === "Open_Palm") {
                        currentDetectedGesture = "Open_Palm";
                        gestureOutput.innerHTML = "🖐️";
                        gestureOutput.className = "text-5xl drop-shadow-[0_0_10px_rgba(96,165,250,0.8)] transition-all scale-110 h-14 flex items-center justify-center";
                    } else if (categoryName === "Victory") {
                        currentDetectedGesture = "Victory";
                        gestureOutput.innerHTML = "✌️";
                        gestureOutput.className = "text-5xl drop-shadow-[0_0_10px_rgba(244,114,182,0.8)] transition-all scale-110 h-14 flex items-center justify-center";
                    } else {
                        // 偵測到手，但不是猜拳手勢
                        currentDetectedGesture = null;
                        gestureOutput.innerHTML = "❓";
                        gestureOutput.className = "text-5xl drop-shadow-md grayscale opacity-50 transition-none scale-100 h-14 flex items-center justify-center";
                    }
                } else {
                    currentDetectedGesture = null;
                    gestureOutput.innerHTML = "❓";
                    gestureOutput.className = "text-5xl drop-shadow-md grayscale opacity-50 transition-none scale-100 h-14 flex items-center justify-center";
                }
                canvasCtx.restore();
            }

            // 透過 requestAnimationFrame 不斷循環執行
            if (webcamRunning === true) {
                window.requestAnimationFrame(predictWebcam);
            }
        }

        // 遊戲核心邏輯：倒數與判定勝負
        playGameBtn.addEventListener("click", () => {
            if (!webcamRunning) return alert("請先開啟相機！");
            if (isPlaying) return;
            isPlaying = true;
            playGameBtn.disabled = true;
            playGameBtn.classList.replace("bg-green-600", "bg-gray-500");
            
            let count = 3;
            compChoiceEl.innerHTML = "🤔";
            compChoiceEl.classList.add("animate-bounce");
            gameMessageEl.innerHTML = `倒數... ${count}`;
            gameMessageEl.className = "text-xl font-black text-yellow-400 h-6 drop-shadow-[0_0_10px_rgba(250,204,21,0.8)] text-center flex-1 mx-2 truncate leading-6 mt-2";

            const countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    gameMessageEl.innerHTML = `倒數... ${count}`;
                } else {
                    clearInterval(countdownInterval);
                    resolveGame();
                }
            }, 1000);
        });

        function resolveGame() {
            isPlaying = false;
            playGameBtn.disabled = false;
            playGameBtn.classList.replace("bg-gray-500", "bg-green-600");
            compChoiceEl.classList.remove("animate-bounce");
            
            if (!currentDetectedGesture) {
                gameMessageEl.innerHTML = "❌ 沒看到手勢！";
                gameMessageEl.className = "text-base font-black text-red-500 h-6 text-center flex-1 mx-2 truncate leading-6 mt-2";
                compChoiceEl.innerHTML = "🤖";
                return;
            }

            const choices = ["Closed_Fist", "Open_Palm", "Victory"];
            const compChoice = choices[Math.floor(Math.random() * choices.length)];
            
            // 顯示電腦出拳
            if (compChoice === "Closed_Fist") compChoiceEl.innerHTML = "✊";
            else if (compChoice === "Open_Palm") compChoiceEl.innerHTML = "🖐️";
            else if (compChoice === "Victory") compChoiceEl.innerHTML = "✌️";

            // 判斷勝負
            if (currentDetectedGesture === compChoice) {
                gameMessageEl.innerHTML = "🤝 平手！";
                gameMessageEl.className = "text-lg font-black text-gray-300 h-6 drop-shadow-md scale-110 transition-transform text-center flex-1 mx-2 truncate leading-6 mt-2";
            } else if (
                (currentDetectedGesture === "Closed_Fist" && compChoice === "Victory") ||
                (currentDetectedGesture === "Open_Palm" && compChoice === "Closed_Fist") ||
                (currentDetectedGesture === "Victory" && compChoice === "Open_Palm")
            ) {
                gameMessageEl.innerHTML = "🎉 你贏了！";
                gameMessageEl.className = "text-lg font-black text-green-400 h-6 drop-shadow-[0_0_10px_rgba(74,222,128,0.8)] scale-110 transition-transform text-center flex-1 mx-2 truncate leading-6 mt-2";
                playerScore++;
                playerScoreEl.innerText = playerScore;
            } else {
                gameMessageEl.innerHTML = "😭 你輸了！";
                gameMessageEl.className = "text-lg font-black text-red-400 h-6 drop-shadow-[0_0_10px_rgba(248,113,113,0.8)] scale-110 transition-transform text-center flex-1 mx-2 truncate leading-6 mt-2";
                compScore++;
                compScoreEl.innerText = compScore;
            }
        }
    </script>
</body>
</html>
