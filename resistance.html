<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 雷神理化實驗室 ⚡</title>
    <style>
        :root {
            --primary-color: #00d2ff;
            --accent-color: #3a7bd5;
            --bg-dark: #0f172a;
            --card-bg: #ffffff;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: var(--bg-dark);
            color: #1e293b;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 2rem;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.5);
            border: 4px solid var(--primary-color);
        }

        .header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .header h1 {
            margin: 0;
            background: linear-gradient(90deg, #3a7bd5, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            background: #f8fafc;
            padding: 1.2rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        /* 材料選擇：紅色、粗體、放大 */
        #material-select {
            padding: 8px;
            border-radius: 8px;
            font-size: 1.25rem; 
            font-weight: 900;    
            color: #e11d48;    
            border: 2px solid #e11d48;
            background-color: #fff1f2;
            cursor: pointer;
        }

        #material-select option {
            font-weight: bold;
            color: #e11d48;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1rem;
        }

        .value-tag {
            background: var(--accent-color);
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .canvas-container {
            position: relative;
            background: #000000;
            border-radius: 1.5rem;
            overflow: hidden;
            height: 500px;
            border: 4px solid #334155;
        }

        #animation-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .data-board {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 1.5rem;
        }

        .stat-card {
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 15px;
            text-align: center;
            flex: 1;
            max-width: 300px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1e40af;
        }

        .info-tips {
            background: #fffbeb;
            border: 1px solid #fde68a;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #92400e;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚡ 雷神理化實驗室：電阻微觀世界 ⚡</h1>
    </div>

    <div class="control-panel">
        <div class="control-group">
            <div class="label-row">🔌 材料選擇 (ρ)：</div>
            <select id="material-select">
                <option value="0.10" data-color="#FFD700" data-symbol="Au">金 (Au) - 超低阻礙</option>
                <option value="0.16" data-color="#C0C0C0" data-symbol="Ag" selected>銀 (Ag) - 傳導王者</option>
                <option value="0.17" data-color="#B87333" data-symbol="Cu">銅 (Cu) - 導線首選</option>
                <option value="3.50" data-color="#444444" data-symbol="C">石墨 (C) - 阻力巨大</option>
            </select>
        </div>

        <div class="control-group">
            <div class="label-row">
                <span>📏 線段長度 (L)：</span>
                <span class="value-tag" id="val-length">400</span>
            </div>
            <input type="range" id="input-length" min="200" max="600" value="400">
        </div>

        <div class="control-group">
            <div class="label-row">
                <span>厚度/截面積 (W)：</span>
                <span class="value-tag" id="val-width">80</span>
            </div>
            <input type="range" id="input-width" min="30" max="140" value="80">
        </div>
    </div>

    <div class="canvas-container" id="canvas-wrap">
        <canvas id="animation-canvas"></canvas>
    </div>

    <div class="data-board">
        <div class="stat-card">
            <span>電阻 R ≈</span><br>
            <span class="stat-value" id="calc-r">0.00</span> Ω
        </div>
        <div class="stat-card">
            <span>目前亮度</span><br>
            <span class="stat-value" id="calc-light" style="color:#eab308">非常亮</span>
        </div>
    </div>

    <div class="info-tips">
        💡 <b>觀察重點：</b> 電子已調整為「鮮艷螢光藍」，並帶有外擴光暈，使其在淺色導線內更加顯眼。
    </div>
</div>

<script>
    const canvas = document.getElementById('animation-canvas');
    const ctx = canvas.getContext('2d');
    const canvasWrap = document.getElementById('canvas-wrap');

    const materialSelect = document.getElementById('material-select');
    const inputLength = document.getElementById('input-length');
    const inputWidth = document.getElementById('input-width');
    const displayLength = document.getElementById('val-length');
    const displayWidth = document.getElementById('val-width');
    const displayR = document.getElementById('calc-r');
    const displayLight = document.getElementById('calc-light');

    // 載入雷神圖案
    const thunderImg = new Image();
    thunderImg.crossOrigin = "anonymous";
    thunderImg.src = 'thunder.png'; 
    
    let imgLoaded = false;
    thunderImg.onload = () => { imgLoaded = true; };
    thunderImg.onerror = () => { imgLoaded = false; };

    let electrons = [];
    let atoms = [];

    class Electron {
        constructor(x, y, targetSpeed) {
            this.x = x;
            this.y = y;
            this.targetSpeed = targetSpeed;
            this.vx = targetSpeed;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.radius = 4;
        }

        update(rect, rho) {
            this.x += this.vx;
            this.y += this.vy;

            if (this.y < rect.y + this.radius || this.y > rect.y + rect.h - this.radius) {
                this.vy *= -1;
            }

            if (this.x > rect.x + rect.w) {
                this.x = rect.x;
                this.y = rect.y + Math.random() * rect.h;
            }

            if (Math.random() < (rho * 0.06)) { 
                this.vx *= 0.4; 
                this.vy += (Math.random() - 0.5) * 2;
            } else {
                this.vx = this.vx * 0.98 + this.targetSpeed * 0.02;
                this.vy *= 0.98;
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            // 修正為極鮮艷的螢光藍色
            ctx.fillStyle = '#00ffff'; 
            ctx.fill();
            
            // 強化螢光效果 (Neon Glow)
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#00ffff';
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // 重設陰影避免影響後續繪製
            ctx.shadowBlur = 0;
        }
    }

    function initSimulation() {
        canvas.width = canvasWrap.offsetWidth;
        canvas.height = canvasWrap.offsetHeight;

        const L = parseInt(inputLength.value);
        const W = parseInt(inputWidth.value);
        const rho = parseFloat(materialSelect.value);
        const option = materialSelect.options[materialSelect.selectedIndex];

        const rectX = (canvas.width - L) / 2;
        const rectY = (canvas.height - W) / 2;

        atoms = [];
        const density = Math.floor((L * W) / 800 * rho);
        for (let i = 0; i < density; i++) {
            atoms.push({
                x: rectX + Math.random() * L,
                y: rectY + Math.random() * W,
                color: option.getAttribute('data-color'),
                symbol: option.getAttribute('data-symbol')
            });
        }

        electrons = [];
        const baseSpeed = Math.max(0.5, 2.5 / (rho * (L / 300))); 
        const count = Math.min(100, Math.floor(W * 0.6));
        for (let i = 0; i < count; i++) {
            electrons.push(new Electron(rectX + Math.random() * L, rectY + Math.random() * W, baseSpeed));
        }
    }

    function drawBigBulb(x, y, R) {
        const intensity = Math.min(1, 1.8 / (R + 0.4));
        const bulbRadius = 45;

        const glow = ctx.createRadialGradient(x, y, 5, x, y, bulbRadius * 3);
        glow.addColorStop(0, `rgba(255, 255, 100, ${intensity * 0.6})`);
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(x, y, bulbRadius * 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#64748b';
        ctx.fillRect(x - 20, y + bulbRadius - 10, 40, 25);

        ctx.beginPath();
        ctx.arc(x, y, bulbRadius, 0, Math.PI * 2);
        ctx.fillStyle = intensity > 0.1 ? `rgba(255, 255, 0, ${intensity})` : '#1e293b';
        ctx.fill();
        ctx.strokeStyle = '#94a3b8';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x, y - 5, 15, Math.PI, 0);
        ctx.strokeStyle = intensity > 0.4 ? '#f97316' : '#475569';
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    function draw() {
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const L = parseInt(inputLength.value);
        const W = parseInt(inputWidth.value);
        const rho = parseFloat(materialSelect.value);
        const rectX = (canvas.width - L) / 2;
        const rectY = (canvas.height - W) / 2;

        const imgSize = 150;
        const imgX = rectX - imgSize - 10;
        const imgY = canvas.height / 2 - imgSize / 2;
        
        if (imgLoaded) {
            ctx.drawImage(thunderImg, imgX, imgY, imgSize, imgSize);
        } else {
            ctx.fillStyle = "#fbbf24";
            ctx.font = "80px Arial";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText("⚡", imgX + imgSize/2, canvas.height/2);
        }

        // 導線 (淺灰色超細線框)
        ctx.fillStyle = '#f1f5f9'; 
        ctx.strokeStyle = '#cbd5e1'; 
        ctx.lineWidth = 0.8; 
        ctx.fillRect(rectX, rectY, L, W);
        ctx.strokeRect(rectX, rectY, L, W);

        // 原子核
        atoms.forEach(atom => {
            ctx.beginPath();
            ctx.arc(atom.x, atom.y, 12, 0, Math.PI * 2);
            ctx.fillStyle = atom.color;
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(atom.symbol, atom.x, atom.y);
        });

        // 電子 (小藍點)
        electrons.forEach(e => {
            e.update({x: rectX, y: rectY, w: L, h: W}, rho);
            e.draw();
        });

        // 燈泡
        const R = (rho * L / W);
        drawBigBulb(rectX + L + 90, canvas.height / 2, R);

        displayLength.textContent = L;
        displayWidth.textContent = W;
        displayR.textContent = R.toFixed(2);
        
        let msg = "🌟 亮度極高";
        if (R > 1.5) msg = "💡 正常發光";
        if (R > 5) msg = "🔆 燈光微弱";
        if (R > 10) msg = "🌑 熄滅狀態";
        displayLight.textContent = msg;

        requestAnimationFrame(draw);
    }

    [materialSelect, inputLength, inputWidth].forEach(el => {
        el.addEventListener('input', initSimulation);
    });
    window.addEventListener('resize', initSimulation);

    initSimulation();
    draw();
</script>

</body>
</html>
